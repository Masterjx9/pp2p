name: Publish Python SDK

on:
  workflow_dispatch:
  release:
    types:
      - published
  push:
    branches:
      - main

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      publish_needed: ${{ steps.pypi_check.outputs.publish_needed }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read package metadata
        id: meta
        run: |
          python - <<'PY'
          import os
          import tomllib
          with open("bindings/python/pyproject.toml", "rb") as f:
              project = tomllib.load(f)["project"]
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"name={project['name']}\n")
              out.write(f"version={project['version']}\n")
          PY

      - name: Check if version is already on PyPI
        id: pypi_check
        run: |
          python - <<'PY'
          import json
          import os
          import tomllib
          import urllib.error
          import urllib.request

          with open("bindings/python/pyproject.toml", "rb") as f:
              project = tomllib.load(f)["project"]

          name = project["name"]
          version = project["version"]
          url = f"https://pypi.org/pypi/{name}/json"

          publish_needed = True
          try:
              with urllib.request.urlopen(url, timeout=15) as resp:
                  payload = json.load(resp)
              releases = payload.get("releases", {})
              publish_needed = version not in releases
          except urllib.error.HTTPError as e:
              if e.code != 404:
                  raise

          print(f"{name} {version} publish_needed={publish_needed}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"publish_needed={'true' if publish_needed else 'false'}\n")
          PY

  build_native:
    needs: preflight
    if: needs.preflight.outputs.publish_needed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            artifact: win32-x64
          - os: ubuntu-22.04
            artifact: linux-x64
          - os: macos-14
            artifact: darwin-universal
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build native core (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: .\scripts\build_pp2p_core.ps1

      - name: Build native core (Linux/macOS)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          chmod +x scripts/build_pp2p_core_unix.sh
          ./scripts/build_pp2p_core_unix.sh

      - name: Build native core (macOS universal)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          cargo build --manifest-path rust/Cargo.toml --release -p pp2p-ffi --target aarch64-apple-darwin
          cargo build --manifest-path rust/Cargo.toml --release -p pp2p-ffi --target x86_64-apple-darwin

      - name: Stage bundled native library (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path out\win32-x64 | Out-Null
          Copy-Item dist\pp2p_core\windows-x64\pp2p_core.dll out\win32-x64\pp2p_core.dll -Force

      - name: Stage bundled native library (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p out/linux-x64
          cp -f dist/pp2p_core/linux-x64/libpp2p_core.so out/linux-x64/libpp2p_core.so

      - name: Stage bundled native library (macOS universal)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p out/darwin-x64
          mkdir -p out/darwin-arm64
          cp -f rust/target/x86_64-apple-darwin/release/libpp2p_ffi.dylib out/darwin-x64/libpp2p_core.dylib
          cp -f rust/target/aarch64-apple-darwin/release/libpp2p_ffi.dylib out/darwin-arm64/libpp2p_core.dylib

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-native-${{ matrix.artifact }}
          path: out/**

  publish:
    needs: [preflight, build_native]
    if: needs.preflight.outputs.publish_needed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: python-native-*
          merge-multiple: true
          path: tmp_native

      - name: Stage downloaded native payload
        shell: bash
        run: |
          mkdir -p bindings/python/pp2p_core/native/win32-x64
          mkdir -p bindings/python/pp2p_core/native/linux-x64
          mkdir -p bindings/python/pp2p_core/native/darwin-x64
          mkdir -p bindings/python/pp2p_core/native/darwin-arm64

          cp -f tmp_native/win32-x64/pp2p_core.dll bindings/python/pp2p_core/native/win32-x64/pp2p_core.dll
          cp -f tmp_native/linux-x64/libpp2p_core.so bindings/python/pp2p_core/native/linux-x64/libpp2p_core.so
          cp -f tmp_native/darwin-x64/libpp2p_core.dylib bindings/python/pp2p_core/native/darwin-x64/libpp2p_core.dylib
          cp -f tmp_native/darwin-arm64/libpp2p_core.dylib bindings/python/pp2p_core/native/darwin-arm64/libpp2p_core.dylib

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build twine
          python -m build bindings/python

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "${TWINE_PASSWORD}" ]; then
            echo "PYPI_API_TOKEN secret is missing"
            exit 1
          fi
          twine upload bindings/python/dist/*

  skip:
    needs: preflight
    if: needs.preflight.outputs.publish_needed != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Version already exists on PyPI; skipping publish."
