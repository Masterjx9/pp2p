name: Publish NPM SDK

on:
  workflow_dispatch:
  release:
    types:
      - published
  push:
    branches:
      - main

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      publish_needed: ${{ steps.check.outputs.publish_needed }}
      version: ${{ steps.meta.outputs.version }}

    defaults:
      run:
        working-directory: bindings/javascript

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Read package metadata
        id: meta
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if version is already on npm
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "publish_needed=false" >> "$GITHUB_OUTPUT"
            echo "Version $NAME@$VERSION already published."
          else
            echo "publish_needed=true" >> "$GITHUB_OUTPUT"
          fi

  build_native:
    needs: preflight
    if: needs.preflight.outputs.publish_needed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            artifact: win32-x64
          - os: ubuntu-22.04
            artifact: linux-x64
          - os: macos-14
            artifact: darwin-universal
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build native core (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: .\scripts\build_pp2p_core.ps1

      - name: Build native core (Linux/macOS)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          chmod +x scripts/build_pp2p_core_unix.sh
          ./scripts/build_pp2p_core_unix.sh

      - name: Build native core (macOS universal)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          cargo build --manifest-path rust/Cargo.toml --release -p pp2p-ffi --target aarch64-apple-darwin
          cargo build --manifest-path rust/Cargo.toml --release -p pp2p-ffi --target x86_64-apple-darwin

      - name: Stage native artifact (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path out\win32-x64 | Out-Null
          Copy-Item dist\pp2p_core\windows-x64\pp2p_core.dll out\win32-x64\pp2p_core.dll -Force

      - name: Stage native artifact (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p out/linux-x64
          cp -f dist/pp2p_core/linux-x64/libpp2p_core.so out/linux-x64/libpp2p_core.so

      - name: Stage native artifact (macOS universal)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p out/darwin-x64
          mkdir -p out/darwin-arm64
          cp -f rust/target/x86_64-apple-darwin/release/libpp2p_ffi.dylib out/darwin-x64/libpp2p_core.dylib
          cp -f rust/target/aarch64-apple-darwin/release/libpp2p_ffi.dylib out/darwin-arm64/libpp2p_core.dylib

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-native-${{ matrix.artifact }}
          path: out/**

  publish:
    needs: [preflight, build_native]
    if: needs.preflight.outputs.publish_needed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: bindings/javascript

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: npm-native-*
          merge-multiple: true
          path: tmp_native

      - name: Stage downloaded native payload
        shell: bash
        run: |
          mkdir -p bindings/javascript/native/win32-x64
          mkdir -p bindings/javascript/native/linux-x64
          mkdir -p bindings/javascript/native/darwin-x64
          mkdir -p bindings/javascript/native/darwin-arm64

          cp -f tmp_native/win32-x64/pp2p_core.dll bindings/javascript/native/win32-x64/pp2p_core.dll || \
            cp -f tmp_native/out/win32-x64/pp2p_core.dll bindings/javascript/native/win32-x64/pp2p_core.dll
          cp -f tmp_native/linux-x64/libpp2p_core.so bindings/javascript/native/linux-x64/libpp2p_core.so || \
            cp -f tmp_native/out/linux-x64/libpp2p_core.so bindings/javascript/native/linux-x64/libpp2p_core.so
          cp -f tmp_native/darwin-x64/libpp2p_core.dylib bindings/javascript/native/darwin-x64/libpp2p_core.dylib || \
            cp -f tmp_native/out/darwin-x64/libpp2p_core.dylib bindings/javascript/native/darwin-x64/libpp2p_core.dylib
          cp -f tmp_native/darwin-arm64/libpp2p_core.dylib bindings/javascript/native/darwin-arm64/libpp2p_core.dylib || \
            cp -f tmp_native/out/darwin-arm64/libpp2p_core.dylib bindings/javascript/native/darwin-arm64/libpp2p_core.dylib

      - name: Verify package tarball
        run: npm pack --dry-run

      - name: Publish package
        env:
          NPM_ACCESS_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
        run: |
          unset NODE_AUTH_TOKEN
          if npm publish --access public --provenance; then
            echo "Published via trusted publisher."
            exit 0
          fi

          if [ -n "${NPM_ACCESS_TOKEN}" ]; then
            echo "Trusted publish failed; trying token fallback."
            export NODE_AUTH_TOKEN="${NPM_ACCESS_TOKEN}"
            npm publish --access public
            exit 0
          fi

          echo "Trusted publish failed and NPM_ACCESS_TOKEN is not set."
          exit 1

  skip:
    needs: preflight
    if: needs.preflight.outputs.publish_needed != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Version already exists on npm; skipping publish."
